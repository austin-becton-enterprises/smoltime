<div class="smoltime-container" (click)="onContainerClick($event)">
  <h2 class="title" (click)="onTitleClick($event)">{{ title }}</h2>
  <p class="subtitle">{{ description }}</p>
  <mat-form-field appearance="fill" (click)="onDatePickerClick($event)">
    <mat-label>Choose a date</mat-label>
    <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate" (ngModelChange)="onDateChange()">
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
</div>
